services:

  video-loop-source:
    image: ghcr.io/insight-platform/savant-adapters-gstreamer:0.6.0
    restart: unless-stopped
    volumes:
      - zmq_sockets:/tmp/zmq-sockets
      - /tmp/video-loop-source-downloads:/tmp/video-loop-source-downloads
    environment:
      - LOCATION=https://eu-central-1.linodeobjects.com/savant-data/demo/shuffle_dance.mp4
      - DOWNLOAD_PATH=/tmp/video-loop-source-downloads
      - ZMQ_ENDPOINT=pub+connect:ipc:///tmp/zmq-sockets/input-video.ipc
      - SOURCE_ID=video
      - SYNC_OUTPUT=True
    entrypoint: /opt/savant/adapters/gst/sources/video_loop.sh
    depends_on:
      router:
        condition: service_started

  router:
    image: ghcr.io/insight-platform/savant-router-x86:v0.6.0
    restart: unless-stopped
    environment:
      - SCREENSHOT_PERIOD=10
    volumes:
      - ./src/router_config.json:/opt/etc/configuration.json:ro
      - ./src:/opt/python:ro
      - zmq_sockets:/tmp/zmq-sockets

  screenshot-maker:
    privileged: true
    restart: unless-stopped
    image: ghcr.io/insight-platform/savant-deepstream:0.6.0-7.1
    volumes:
      - zmq_sockets:/tmp/zmq-sockets
      - ..:/opt/savant/samples
      - ../../data/output/footage/screenshots:/screenshots
    command: samples/router/src/screenshot_maker.yml
    environment:
      - LOGLEVEL=savant_rs::message::validate_seq_iq=error,info
      - ZMQ_SRC_ENDPOINT=router+connect:ipc:///tmp/zmq-sockets/screenshots.ipc
      - ZMQ_SINK_ENDPOINT=pub+bind:ipc:///tmp/zmq-sockets/analytics.ipc
      - SOURCE_EVICTION_INTERVAL=300
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  savant-analytics:
    image: ghcr.io/insight-platform/savant-rs-py313:v0.6.0
    restart: unless-stopped
    environment:
      - LOGLEVEL=info
      - ZMQ_SRC_ENDPOINT=sub+connect:ipc:///tmp/zmq-sockets/analytics.ipc
    volumes:
      - zmq_sockets:/tmp/zmq-sockets
      - ./src/analytics.py:/opt/python/analytics.py:ro
    command: python3 /opt/python/analytics.py
    depends_on:
      screenshot-maker:
        condition: service_healthy

  video-sink:
    container_name: video-sink
    image: ghcr.io/insight-platform/savant-adapters-gstreamer:0.6.0
    restart: unless-stopped
    entrypoint: /opt/savant/adapters/gst/sinks/video_files.py
    environment:
      - ZMQ_ENDPOINT=router+connect:ipc:///tmp/zmq-sockets/archive.ipc
      - DIR_LOCATION=/data/%source_id
      - SKIP_FRAMES_WITHOUT_OBJECTS=False
      - CHUNK_SIZE=1000
      - METADATA_JSON_FORMAT=native
    volumes:
      - ../../data/output/footage:/data
      - zmq_sockets:/tmp/zmq-sockets

volumes:
  zmq_sockets:
