services:

  video-loop-source:
    image: ghcr.io/insight-platform/savant-adapters-gstreamer:0.6.0
    extends:
      file: docker-compose.l4t.yml
      service: video-loop-source

  module:
    privileged: true
    image: ghcr.io/insight-platform/savant-deepstream:0.6.0-7.1
    extends:
      file: docker-compose.l4t.yml
      service: module
    runtime: runc
    environment:
      - CODEC=h264
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  always-on-sink:
    privileged: true
    image: ghcr.io/insight-platform/savant-adapters-deepstream:0.6.0-7.1
    extends:
      file: docker-compose.l4t.yml
      service: always-on-sink
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

volumes:
  zmq_sockets:
