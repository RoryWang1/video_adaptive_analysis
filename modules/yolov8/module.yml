name: yolov8_detector

parameters:
  batch_size: 8
  frame:
    width: 1280
    height: 720

  # 输出帧配置 - Always-On RTSP Sink 需要
  output_frame:
    codec: ${oc.env:CODEC, 'h264'}

  # Telemetry 配置
  telemetry:
    metrics:
      frame_period: 1000  # 每 1000 帧报告一次
      time_period: 1      # 每 1 秒报告一次
      history: 100        # 保留最近 100 个数据点
      extra_labels:
        module: yolov8
        model: yolov8n

pipeline:
  elements:
    - element: nvinfer@detector
      name: yolov8
      model:
        format: onnx
        model_file: /models/yolov8n.onnx
        batch_size: 8
        precision: fp16

        input:
          shape: [3, 640, 640]
          scale_factor: 0.003921568627451
          offsets: [0.0, 0.0, 0.0]
          color_format: rgb

        output:
          num_detected_classes: 80
          layer_names: ['output0']
          converter:
            module: savant.converter.yolo
            class_name: TensorToBBoxConverter
            kwargs:
              confidence_threshold: 0.25
              nms_iou_threshold: 0.45
