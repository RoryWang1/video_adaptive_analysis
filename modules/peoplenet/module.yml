name: peoplenet_detector

parameters:
  batch_size: 4
  frame:
    width: 1280
    height: 720

  # 输出帧配置 - Always-On RTSP Sink 需要
  output_frame:
    codec: ${oc.env:CODEC, 'h264'}

  # Telemetry 配置
  telemetry:
    metrics:
      frame_period: 1000  # 每 1000 帧报告一次
      time_period: 1      # 每 1 秒报告一次
      history: 100        # 保留最近 100 个数据点
      extra_labels:
        module: peoplenet
        model: resnet34_peoplenet

pipeline:
  elements:
    - element: nvinfer@detector
      name: peoplenet
      model:
        format: onnx
        model_file: /models/peoplenet/resnet34_peoplenet.onnx
        batch_size: ${parameters.batch_size}
        input:
          layer_name: input_1:0
          shape: [3, 544, 960]
          scale_factor: 0.0039215697906911373
        output:
          layer_names: [output_bbox/BiasAdd:0, output_cov/Sigmoid:0]
          num_detected_classes: 3
          objects:
            - class_id: 0
              label: person
              selector:
                kwargs:
                  min_width: 32
                  min_height: 32
            - class_id: 2
              label: face
              selector:
                kwargs:
                  confidence_threshold: 0.1
                  min_width: 10
                  min_height: 10
